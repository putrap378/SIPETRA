<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tracking Bantuan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar p-3">

        <h3>SIPETRA</h3>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a href="dashboard.html" class="nav-link text-white">
                    <i class="bi bi-house"></i> Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a href="bantuan.html" class="nav-link text-white">
                    <i class="bi bi-box"></i> Data Bantuan
                </a>
            </li>

            <li class="nav-item">
                <a href="pengaduan.html" class="nav-link text-white">
                    <i class="bi bi-chat-dots"></i> Pengaduan
                </a>
            </li>

            <li class="nav-item">
                <a href="tracking.html" class="nav-link active bg-white text-primary">
                    <i class="bi bi-geo-alt"></i> Tracking
                </a>
            </li>

            <li class="nav-item">
                <a href="laporan.html" class="nav-link text-white">
                    <i class="bi bi-file-earmark"></i> Laporan
                </a>
            </li>

            <hr>

            <li class="nav-item">
                <a href="index.html" class="nav-link text-white">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </a>
            </li>

        </ul>

    </div>

    <!-- Content -->

    <div class="flex-grow-1 p-4">

        <h2 class="mb-4">Tracking Bantuan</h2>

        <div class="card shadow">

            <div class="card-body">

                <div class="row">

                    <div class="col-md-10">

                        <input
                        type="text"
                        id="cariNik"
                        class="form-control"
                        placeholder="Masukkan NIK">

                    </div>

                    <div class="col-md-2">

                        <button
                        class="btn btn-primary w-100"
                        onclick="trackingData()">

                        Cari

                        </button>

                    </div>

                </div>

            </div>

        </div>

        <div
        class="card shadow mt-4">

            <div class="card-body">

                <h4>Hasil Tracking</h4>

                <hr>

                <p><strong>Nama :</strong> <span id="hasilNama">-</span></p>

                <p><strong>NIK :</strong> <span id="hasilNik">-</span></p>

                <p><strong>Jenis Bantuan :</strong> <span id="hasilJenis">-</span></p>

                <p><strong>Status :</strong>

                    <span id="hasilStatus"
                    class="badge bg-secondary">

                    -

                    </span>

                </p>

                <hr>

                <h5>Riwayat</h5>

                <ul id="riwayat" class="list-group">

                    <li class="list-group-item">

                    Belum ada data

                    </li>

                </ul>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/tracking.js"></script>

</body>

</html>
