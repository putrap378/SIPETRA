<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Data Pengaduan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar p-3">

        <h3 class="text-center mb-4">
            SIPETRA
        </h3>

        <ul class="nav flex-column">

            <li class="nav-item mb-2">
                <a href="dashboard.html" class="nav-link text-white">
                    <i class="bi bi-house"></i>
                    Dashboard
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="bantuan.html" class="nav-link text-white">
                    <i class="bi bi-box"></i>
                    Data Bantuan
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="pengaduan.html" class="nav-link active bg-white text-primary">
                    <i class="bi bi-chat-dots"></i>
                    Pengaduan
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="tracking.html" class="nav-link text-white">
                    <i class="bi bi-geo-alt"></i>
                    Tracking
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="laporan.html" class="nav-link text-white">
                    <i class="bi bi-file-earmark"></i>
                    Laporan
                </a>
            </li>

            <hr>

            <li class="nav-item">
                <a href="index.html" class="nav-link text-white">
                    <i class="bi bi-box-arrow-left"></i>
                    Logout
                </a>
            </li>

        </ul>

    </div>

    <!-- Content -->

    <div class="flex-grow-1 p-4">

        <h2>Data Pengaduan</h2>

        <button
        class="btn btn-primary mb-3"
        data-bs-toggle="modal"
        data-bs-target="#modalPengaduan">

            <i class="bi bi-plus-circle"></i>

            Tambah Pengaduan

        </button>

        <input
        type="text"
        id="searchPengaduan"
        class="form-control mb-3"
        placeholder="Cari berdasarkan nama atau judul">

        <table class="table table-bordered table-hover">

            <thead class="table-primary">

                <tr>

                    <th>No</th>
                    <th>Nama</th>
                    <th>NIK</th>
                    <th>Kategori</th>
                    <th>Judul</th>
                    <th>Status</th>
                    <th>Foto</th>
                    <th>Aksi</th>

                </tr>

            </thead>

            <tbody id="tbodyPengaduan">

            </tbody>

        </table>

    </div>

</div>

<!-- Modal -->

<div
class="modal fade"
id="modalPengaduan">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5>

Tambah Pengaduan

</h5>

<button
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<input
id="nama"
class="form-control mb-2"
placeholder="Nama">

<input
id="nik"
class="form-control mb-2"
placeholder="NIK">

<select
id="kategori"
class="form-select mb-2">

<option>Jalan Rusak</option>

<option>Bantuan Sosial</option>

<option>Kesehatan</option>

<option>Pendidikan</option>

<option>Lainnya</option>

</select>

<input
id="judul"
class="form-control mb-2"
placeholder="Judul Pengaduan">

<textarea
id="deskripsi"
class="form-control mb-2"
rows="4"
placeholder="Deskripsi Pengaduan"></textarea>

<input
type="file"
id="foto"
class="form-control mb-2"
accept="image/*">

<select
id="status"
class="form-select">

<option>Menunggu</option>

<option>Diproses</option>

<option>Selesai</option>

</select>

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="simpanPengaduan()">

Simpan

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/pengaduan.js"></script>

<footer class="text-center mt-5 mb-3 text-muted">

<hr>

SIPETRA © 2026

</footer>

</body>

</html>
